<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <title>Sistema de Frota</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

    <header>

        <h1>Gestão de Frota</h1>

        <button onclick="abrirModal()">Nova Viagem</button>

    </header>


    <section class="dashboard">

        <div class="card">

            <h3>Viagens</h3>

            <p id="totalViagens">0</p>

        </div>

        <div class="card">

            <h3>Frete</h3>

            <p id="totalFrete">0</p>

        </div>

        <div class="card">

            <h3>Despesas</h3>

            <p id="totalDespesas">0</p>

        </div>

        <div class="card">

            <h3>Lucro</h3>

            <p id="totalLucro">0</p>

        </div>

    </section>


    <section class="grafico">

        <canvas id="grafico"></canvas>

    </section>


    <section>

        <table>

            <thead>

                <tr>
                    <th>Motorista</th>
                    <th>Placa</th>
                    <th>Origem</th>
                    <th>Destino</th>
                    <th>Frete</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>

            </thead>

            <tbody id="tabela"></tbody>

        </table>

    </section>


    <div class="modal" id="modal">

        <div class="modal-box">

            <h2>Criar Viagem</h2>

            <input id="motorista" placeholder="Motorista">

            <input id="placa" placeholder="Placa">

            <input id="origem" placeholder="Origem">

            <input id="destino" placeholder="Destino">

            <input id="hodometro" placeholder="KM inicial">

            <input id="frete" placeholder="Frete">

            <button onclick="criarViagem()">Salvar</button>

            <button onclick="fecharModal()">Cancelar</button>

        </div>

    </div>


    <script src="js/db.js"></script>
    <script src="js/viagens.js"></script>
    <script src="js/pdf.js"></script>
    <script src="js/ui.js"></script>

</body>

</html>
